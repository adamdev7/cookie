<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Admin — {{ config.BUSINESS_NAME }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="login-page d-flex align-items-center">
  <div class="container container-site py-4 py-md-5 px-3">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-10 col-md-5">
        <div class="panel-card panel-body p-4 p-md-5 shadow">
          <div class="text-center mb-4">
            <p class="brand-script mb-1">Administration</p>
            <h2 class="h3 mb-0">{{ config.BUSINESS_NAME }}</h2>
          </div>
          {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} rounded-3">{{ message }}</div>
            {% endfor %}
          {% endwith %}
          <form method="post">
            <div class="mb-3">
              <label class="form-label fw-semibold" for="username">Utilisateur</label>
              <input type="text" class="form-control rounded-3" id="username" name="username" required autofocus>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold" for="password">Mot de passe</label>
              <input type="password" class="form-control rounded-3" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-cookie w-100 rounded-pill py-2">Connexion</button>
          </form>
          <p class="text-center mt-4 mb-0 small">
            <a href="{{ url_for('public.index') }}" class="text-decoration-none fw-semibold" style="color: var(--brand-pink);">← Retour à la boutique</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
